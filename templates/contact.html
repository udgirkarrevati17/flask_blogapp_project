{% extends 'base.html' %}
{% block content %}
<div class="formbox">
    <div class="formcontainer">
        <h2>Contact</h2>
        <form method="POST">
            <input name="name" placeholder="Name">
            <input name="email" placeholder="Email">
            <textarea name="message" placeholder="Message"></textarea>
            <button>Send</button>
        </form>
    </div>
</div>
{% endblock %}
